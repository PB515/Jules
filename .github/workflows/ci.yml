name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  idp-tooling:
    name: IDP tooling (typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  template:
    name: Template (typecheck, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: template/package-lock.json
      - run: npm ci
        working-directory: template
      - run: npm run typecheck
        working-directory: template
      - run: npm test
        working-directory: template
      - run: npm run lint
        working-directory: template
      - run: npm run build
        working-directory: template
